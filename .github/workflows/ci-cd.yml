name: CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

env:
  NEXT_PUBLIC_SITE_URL: https://job-board-jet-delta.vercel.app

jobs:
  ci:
    name: CI — Lint, Typecheck & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: TypeScript type check
        run: npm run typecheck

      - name: Build application
        run: npm run build

  deploy-production:
    name: CD — Deploy to Vercel (Production)
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to Vercel Production
        id: deploy
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: "--prod"
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment deployment URL on commit
        if: success() && steps.deploy.outputs.preview-url != ''
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.preview-url }}';
            const body = [
              '## 🚀 Production Deployment',
              '',
              `**Status:** Successful`,
              `**URL:** ${url}`,
              '',
              `Deployed from commit \`${context.sha.substring(0, 7)}\` on \`${context.ref.replace('refs/heads/', '')}\`.`,
            ].join('\n');
            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body,
            });

  deploy-preview:
    name: CD — Vercel Preview (Pull Request)
    needs: ci
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy Vercel Preview
        id: preview
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment preview URL on pull request
        if: success() && steps.preview.outputs.preview-url != ''
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.preview.outputs.preview-url }}';
            const prNumber = context.issue.number;
            const marker = '<!-- vercel-preview-comment -->';
            const body = [
              marker,
              '## 🔍 Vercel Preview Deployment',
              '',
              `**Preview URL:** ${url}`,
              '',
              `Commit: \`${context.sha.substring(0, 7)}\``,
              '',
              '_This comment is updated automatically by GitHub Actions._',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existing = comments.find((c) =>
              c.user.type === 'Bot' && c.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
